<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gallagher Cardholder Importer</title>
<style>
body { font-family: Arial; background:#f3f4f6; padding:20px; }
.container { max-width:900px; margin:auto; }
.card { background:white; padding:20px; border-radius:10px; margin-bottom:20px; }
.btn { padding:10px 15px; border:none; border-radius:6px; cursor:pointer; }
.btn-primary { background:#2563eb; color:white; }
.btn-success { background:#16a34a; color:white; }
.dropzone { border:2px dashed #ccc; padding:30px; text-align:center; cursor:pointer; }
.progress { height:10px; background:#ddd; border-radius:5px; margin-top:10px; }
.progress-fill { height:100%; width:0%; background:#2563eb; }
</style>
</head>

<body>
<div class="container">

<h2>🔐 Gallagher Cardholder Importer</h2>

<!-- BOTÓN NUEVO -->
<div class="card">
    <button class="btn btn-primary" onclick="checkBackend()">
        🔍 Revisar configuración backend
    </button>
    <pre id="backendStatus"></pre>
</div>

<!-- UPLOAD -->
<div class="card">
    <h3>📁 Subir CSV</h3>

    <div class="dropzone" onclick="fileInput.click()">
        Click o arrastra CSV
    </div>

    <input type="file" id="fileInput" accept=".csv" hidden>

    <div id="preview"></div>

    <button class="btn btn-success" onclick="generateMapping()">
        Continuar → Mapear
    </button>
</div>

<!-- MAPPING -->
<div class="card" id="mappingCard" style="display:none;">
    <h3>🗺️ Mapping</h3>
    <div id="mappingForm"></div>
    <button class="btn btn-success" onclick="startImport()">🚀 Importar</button>
</div>

<!-- PROGRESS -->
<div class="card" id="progressCard" style="display:none;">
    <h3>⏳ Importando...</h3>
    <div id="progressText"></div>
    <div class="progress">
        <div class="progress-fill" id="progressBar"></div>
    </div>
</div>

</div>

<script>
let state = {
    data: [],
    headers: [],
    mapping: {}
};

const fileInput = document.getElementById("fileInput");

fileInput.onchange = e => handleFile(e.target.files[0]);

function handleFile(file) {
    const reader = new FileReader();

    reader.onload = e => {
        const text = e.target.result;
        const lines = text.split("\n");

        const headers = lines[0].split(",").map(h => h.trim());
        state.headers = headers;

        state.data = lines.slice(1).map(l => {
            const vals = l.split(",");
            let obj = {};
            headers.forEach((h,i)=>obj[h]=vals[i]||"");
            return obj;
        });

        renderPreview();
    };

    reader.readAsText(file);
}

function renderPreview() {
    const preview = document.getElementById("preview");

    preview.innerHTML = `
        <p>Filas: ${state.data.length}</p>
        <pre>${JSON.stringify(state.data.slice(0,3), null, 2)}</pre>
    `;
}

function generateMapping() {
    const form = document.getElementById("mappingForm");
    document.getElementById("mappingCard").style.display = "block";

    const fields = ["firstName","lastName","email","cardNumber"];

    form.innerHTML = state.headers.map(h => `
        <div>
            ${h}
            <select onchange="state.mapping['${h}']=this.value">
                <option value="">--</option>
                ${fields.map(f=>`<option value="${f}">${f}</option>`).join("")}
            </select>
        </div>
    `).join("");
}

function buildCardholder(row) {
    let mapped = {};

    for (const [csv, api] of Object.entries(state.mapping)) {
        if (api && row[csv]) {
            mapped[api] = row[csv];
        }
    }

    return {
        firstName: mapped.firstName || "",
        lastName: mapped.lastName || "",
        email: mapped.email,
        cards: mapped.cardNumber ? [{cardNumber: mapped.cardNumber}] : undefined
    };
}

async function startImport() {
    document.getElementById("progressCard").style.display = "block";

    let success = 0;

    for (let i=0;i<state.data.length;i++) {
        const card = buildCardholder(state.data[i]);

        try {
            await fetch("/api/cardholders", {
                method:"POST",
                headers:{ "Content-Type":"application/json" },
                body: JSON.stringify(card)
            });
            success++;
        } catch(e) {}

        let percent = Math.round(((i+1)/state.data.length)*100);
        document.getElementById("progressBar").style.width = percent+"%";
        document.getElementById("progressText").innerText =
            `${success}/${state.data.length}`;
    }

    alert("Import terminado");
}

async function checkBackend() {
    const el = document.getElementById("backendStatus");

    try {
        const res = await fetch("http://localhost:5000/api/cardholders?limit=10");

        if (!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();

        el.innerText = "✅ Conectado\n" + JSON.stringify(data, null, 2);
    } catch (e) {
        el.innerText = "❌ Error conexión: " + e.message;
    }
}
</script>

</body>
</html>
